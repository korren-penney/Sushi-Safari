<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Safari Passport</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
    <nav>
        <div class="logo">🍣 Sushi Safari</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="passport.html">Passport</a></li>
        </ul>
    </nav>
</header>

<main>

    <!-- COVER -->
    <section class="passport-cover">

        <div class="passport-emblem">🍣</div>

        <h1>Summer Sushi Safari</h1>

        <p>Official Metro Sushi Passport</p>

        <span class="passport-year">2026</span>

    </section>

    <!-- PROGRESS -->
    <section class="passport-progress">

        <h2>Safari Progress</h2>

        <div class="passport-progress-bar">
            <div class="passport-progress-fill">7.14%</div>
        </div>

        <p>1 of 14 Restaurants Visited</p>

    </section>

    <!-- STAMPS -->
    <section class="passport-book">

    <section class="passport-page" id="passportGrid">
    </section>
    </section>

    <!-- MOTTO -->
    <section class="passport-motto">

        <blockquote>
            "The journey of a thousand rolls begins with a single piece."
        </blockquote>

    </section>

</main>

</body>

</html>
